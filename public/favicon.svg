<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111118;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="14" fill="url(#bgGradient)"/>
  
  <!-- Developer symbol: </> -->
  <g filter="url(#glow)">
    <!-- Left bracket < -->
    <polyline points="16,16 8,32 16,48" stroke="#39FF14" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right bracket > -->
    <polyline points="48,16 56,32 48,48" stroke="#39FF14" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Forward slash / -->
    <line x1="42" y1="14" x2="22" y2="50" stroke="#007AFF" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  
  <!-- DF letters -->
  <text x="32" y="42" font-family="'Courier New', monospace" font-weight="900" font-size="22" text-anchor="middle" filter="url(#glow)">
    <tspan fill="#39FF14">D</tspan><tspan fill="#007AFF">F</tspan>
  </text>
  
  <!-- Subtle border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#39FF14" stroke-width="0.5" opacity="0.3"/>
</svg>
